<!DOCTYPE html>
<html>
<head>
	<meta charset='utf-8'>
	<title>Generator map</title>
	<link rel='stylesheet' href='style.css'>
	<script src='jquery.js'></script>
	<script src='map.js'></script>
</head>
<body>
	<div class='center-point'>
		<div class='container'>
			<div class='wrapper'>
				<div class='window'>
					<canvas id='map' width='0' height='0'></canvas>
				</div>
			</div>
		</div>
	</div>
	<div class='menu'>
		Wielkość kontynentów:
		<select name='island-size' id='island-size'>
			<option value='8'>8</option>
			<option value='7'>7</option>
			<option value='6'>6</option>
			<option value='5'>5</option>
			<option value='4'>4</option>
			<option value='3'>3</option>
		</select><br>
		Ląd:<input id='land' type='text' size='3' value='30'>%<br>
		Wielkość mapy:<input id='map-size' type='text' size='4' value='128'>px<br>
		<button id='generate'>Generuj</button><br>
	</div>
	<script src='script.js'></script>
</body>
</html>
